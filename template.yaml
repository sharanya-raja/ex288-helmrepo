apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: pipeline-pipeline-employee
spec:
  params:
  - name: git-url
  - name: git-revision

  resourcetemplates:
  - apiVersion: tekton.dev/v1
    kind: PipelineRun
    metadata:
      generateName: pipeline-pipeline-employee-
    spec:
      serviceAccountName: pipeline
      pipelineRef:
        name: pipeline-pipeline-employee
      params:
      - name: registry_url
        value: registry.ocp4.example.com
      - name: git-url
        value: $(tt.params.git-url)
      - name: git-revision
        value: $(tt.params.git-revision)
      - name: maven_repo
        value: http://maven-build/osa/...
      workspaces:
      - name: shared-workspace
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi
